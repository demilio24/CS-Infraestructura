name: Refresh Dashboard

on:
  schedule:
    # Every Monday at 8am CT (1pm UTC)
    - cron: '0 13 * * 1'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NILS-SKILLS

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env with API keys
        run: |
          echo "APIFY_KEY_1=${{ secrets.APIFY_KEY_1 }}" > .env
          echo "APIFY_KEY_2=${{ secrets.APIFY_KEY_2 }}" >> .env

      - name: Run scraper and rebuild dashboard
        run: node scrape-dashboard.js --limit 15

      - name: Commit and push updated dashboard
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NILS-SKILLS/dashboard.html NILS-SKILLS/dashboard-data/ NILS-SKILLS/reports/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh dashboard data $(date +%Y-%m-%d)"
          git push
