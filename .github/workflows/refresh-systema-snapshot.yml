name: Refresh Systema Floyd Dashboard Snapshot

# Cron disabled 2026-05-08: GitHub Actions free-tier scheduled workflows
# fired only ~hourly under load (vs. the configured every-5-min). Replaced
# by the Apps Script time-driven trigger pushSnapshotToGitHub in
# Tom_Systema_Floyd/sheets-snapshot/apps-script/Snapshot.js, owned by
# emilio@nilsdigital.com, which fires reliably every 5 min and writes
# directly to the repo via the GitHub Contents API.
#
# The workflow_dispatch path stays available as a manual rebuild button
# in case the Apps Script trigger ever has to be paused.
on:
  workflow_dispatch: # Manual trigger from GitHub UI

# Prevent overlapping runs (a slow run gets cancelled when the next cron fires)
concurrency:
  group: systema-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch snapshot from Apps Script (sheets)
        run: python .claude/scripts/fetch-systema-snapshot-from-sheets.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Tom_Systema_Floyd/dashboard/snapshot.json \
                  Tom_Systema_Floyd/dashboard/history
          if git diff --cached --quiet; then
            echo "No snapshot changes — skipping commit."
            exit 0
          fi
          git commit -m "snapshot: refresh systema floyd dashboard [skip ci]"
          # Pull-rebase to avoid push races with concurrent commits to main
          git pull --rebase --autostash origin main || true
          git push
