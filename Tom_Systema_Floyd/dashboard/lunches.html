<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Camp Lunches, Systema Floyd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --sf-blue-700:#1b2f6e;
  --sf-blue-500:#2f82c4;
  --sf-blue-50:#eaf2fb;
  --sf-cream:#f8f5ef;
  --sf-white:#ffffff;
  --sf-ink:#162338;
  --sf-ink-60:#465670;
  --sf-ink-50:#6e7c95;
  --sf-ink-40:#9aa5bb;
  --sf-border:#dbe1ee;
  --sf-border-strong:#bac4d8;
  --sf-red:#d8453d;
  --sf-green:#2da375;
  --sf-gold:#d8a427;
  --grad-blue:linear-gradient(135deg,#1b2f6e 0%,#2f82c4 100%);
  --shadow-sm:0 4px 14px -8px rgba(22,35,56,.18);
  --shadow-md:0 10px 26px -14px rgba(22,35,56,.22);
  --radius-md:10px;
  --ease-out:cubic-bezier(.2,.8,.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#f3f5fa;color:var(--sf-ink);font-family:'Inter',sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* Dashboard header, clean, distinct from the public website */
.dash-header{display:flex;align-items:center;gap:18px;padding:14px 32px;background:var(--sf-white);border-bottom:1px solid var(--sf-border);flex-wrap:wrap}
.dash-brand{display:flex;align-items:center;text-decoration:none}
.dash-brand img{height:42px;width:auto;display:block}
.dash-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--sf-ink-60);padding-left:16px;border-left:1.5px solid var(--sf-border-strong)}
.dash-meta{margin-left:auto;display:flex;align-items:center;gap:12px;font-family:'Space Grotesk','Inter',sans-serif;font-size:12.5px;color:var(--sf-ink-50);font-weight:500}
.dash-meta .dot{width:8px;height:8px;border-radius:50%;background:var(--sf-green);box-shadow:0 0 0 4px rgba(45,163,117,.16);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(45,163,117,.16)}50%{box-shadow:0 0 0 7px rgba(45,163,117,.04)}}

main.dash{max-width:1280px;margin:0 auto;padding:18px 32px 60px}
@media (min-width:1600px){main.dash{max-width:1600px}}

.filter-row{display:flex;align-items:center;gap:14px;margin:6px 0 24px;flex-wrap:wrap}
.filter-row .lbl{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--sf-ink-50);text-transform:uppercase}
.filter{display:inline-flex;background:var(--sf-white);border:1px solid var(--sf-border);border-radius:8px;padding:4px;box-shadow:var(--shadow-sm)}
.filter button{font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:9px 18px;border:0;background:transparent;border-radius:5px;color:var(--sf-ink-60);cursor:pointer;transition:color .25s,background .25s}
.filter button:hover{color:var(--sf-blue-700)}
.filter button.active{background:var(--grad-blue);color:#fff;box-shadow:0 6px 14px -6px rgba(47,130,196,.55)}

.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.summary-card{background:var(--sf-white);border:1px solid var(--sf-border);border-radius:var(--radius-md);padding:18px 20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.summary-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--grad-blue);opacity:.85}
.summary-card h3{margin:0 0 6px;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;color:var(--sf-ink-50);text-transform:uppercase}
.summary-card .num{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;color:var(--sf-blue-700);line-height:1;font-variant-numeric:tabular-nums}
.summary-card .sub{font-size:12px;color:var(--sf-ink-50);margin-top:6px}

.week-block{background:var(--sf-white);border:1px solid var(--sf-border);border-radius:12px;padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.week-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.week-h .week-title{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sf-ink)}
.week-h .week-count{font-family:'Space Grotesk','Inter',sans-serif;font-size:12px;color:var(--sf-blue-700);font-weight:600;letter-spacing:.04em;font-variant-numeric:tabular-nums}

table.lunch{width:100%;border-collapse:collapse;font-family:'Inter',sans-serif;font-size:13px}
table.lunch thead th{background:var(--sf-cream);font-family:'Oswald',sans-serif;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sf-ink-50);font-weight:700;padding:8px 10px;text-align:center;border-bottom:1px solid var(--sf-border)}
table.lunch thead th:first-child{text-align:left;padding-left:14px}
table.lunch tbody td{padding:7px 10px;border-bottom:1px solid var(--sf-border);text-align:center;font-variant-numeric:tabular-nums;color:var(--sf-ink)}
table.lunch tbody td:first-child{text-align:left;padding-left:14px;color:var(--sf-ink);font-weight:500;max-width:340px}
table.lunch tbody td.zero{color:var(--sf-ink-40)}
table.lunch tbody tr.cat-hdr td{background:var(--sf-cream);font-family:'Oswald',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--sf-ink-60);padding:6px 14px;border-top:1px solid var(--sf-border-strong)}
table.lunch tbody tr.cat-hdr td:first-child{text-align:left}
table.lunch tbody tr.cat-hdr td:not(:first-child){text-align:center;color:var(--sf-blue-700)}
table.lunch tbody tr.totals td{font-family:'Oswald',sans-serif;font-weight:700;background:var(--sf-blue-50);color:var(--sf-blue-700);text-transform:uppercase;font-size:11px;letter-spacing:.1em;padding:9px 10px;border-top:1.5px solid var(--sf-border-strong)}
table.lunch tbody tr.totals td:first-child{text-align:left;padding-left:14px}
table.lunch tbody td.col-total{font-weight:700;color:var(--sf-blue-700);background:#f7f9fc}
table.lunch .cat-tag{display:inline-block;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:3px;margin-right:8px;vertical-align:middle;line-height:1}
table.lunch .cat-tag.pizza{background:rgba(216,164,39,.18);color:#a37907}
table.lunch .cat-tag.celis{background:rgba(45,163,117,.16);color:#1f6f4f}
table.lunch .cat-tag.breakfast{background:rgba(216,69,61,.14);color:#9c2a25}
table.lunch .cat-tag.none{background:rgba(110,124,149,.15);color:var(--sf-ink-50)}
table.lunch .cat-tag.other{background:rgba(155,75,180,.15);color:#7a3593}

/* Clickable lunch rows that drop down a roster of who ordered it */
table.lunch tbody tr.lunch-row{cursor:pointer;transition:background .15s}
table.lunch tbody tr.lunch-row:hover{background:var(--sf-blue-50)}
table.lunch tbody tr.lunch-row.open{background:#fff7e0}
table.lunch tbody tr.lunch-row td:first-child::before{content:'▸';display:inline-block;color:var(--sf-ink-40);font-size:10px;margin-right:6px;transition:transform .15s}
table.lunch tbody tr.lunch-row.open td:first-child::before{transform:rotate(90deg);color:var(--sf-gold)}
table.lunch tbody tr.lunch-detail{display:none}
table.lunch tbody tr.lunch-detail.open{display:table-row;animation:lunchDrop .22s cubic-bezier(.16,1,.3,1)}
@keyframes lunchDrop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
table.lunch tbody tr.lunch-detail td{padding:0;background:#fdfaf3;border-bottom:1px solid var(--sf-border)}
.lunch-detail-body{padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.lunch-detail-h{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sf-ink-40);font-weight:700;padding-bottom:4px;border-bottom:1px dashed var(--sf-border)}
.lunch-detail-list{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px 18px}
.lunch-detail-list li{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--sf-ink);padding:4px 6px;border-radius:6px;transition:background .15s}
.lunch-detail-list li:hover{background:var(--sf-white)}
.lunch-detail-list .nm{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lunch-detail-list .pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lunch-detail-list .pip.upper{background:#1b2f6e}
.lunch-detail-list .pip.lower{background:#4aa3e0}
.lunch-detail-list .pip.free{background:#f4b63a}
.lunch-detail-list .pip.unknown{background:#c6d1e4}
.lunch-detail-list .days{display:inline-flex;gap:2px}
.lunch-detail-list .days span{display:inline-flex;align-items:center;justify-content:center;width:18px;height:16px;border-radius:3px;background:var(--sf-cream);color:var(--sf-ink-40);font-size:9px;font-weight:700;font-family:'Space Grotesk','Inter',sans-serif;letter-spacing:.04em}
.lunch-detail-list .days span.on{background:var(--sf-blue-700);color:#fff}
.lunch-detail-empty{padding:14px 18px;font-style:italic;color:var(--sf-ink-40);font-size:12.5px}
.lunch-detail-hint{font-size:10.5px;color:var(--sf-ink-40);letter-spacing:.04em;margin-top:2px}

.empty-week{padding:18px;text-align:center;color:var(--sf-ink-40);font-style:italic;font-size:13px}
.error{padding:24px;background:rgba(216,69,61,.1);border:1px solid rgba(216,69,61,.3);border-radius:8px;color:var(--sf-red);font-family:'Space Grotesk','Inter',sans-serif;font-size:13px;margin-bottom:18px}

/* Dashboard nav bar, grouped horizontal navigation: Pages | Sheets | Docs */
.dash-nav{display:flex;align-items:center;gap:6px;margin:18px 0 24px;padding:8px 14px;background:var(--sf-white);border:1px solid var(--sf-border);border-radius:12px;box-shadow:var(--shadow-sm);overflow-x:auto;scrollbar-width:thin}
.dash-nav::-webkit-scrollbar{height:6px}
.dash-nav::-webkit-scrollbar-thumb{background:var(--sf-border-strong);border-radius:3px}
.nav-group{display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.nav-group-label{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--sf-ink-40);text-transform:uppercase;padding:0 8px 0 2px;white-space:nowrap}
.nav-divider{width:1px;height:22px;background:var(--sf-border);margin:0 8px;flex-shrink:0}
.nav-link{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:7px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--sf-ink-60);text-decoration:none;white-space:nowrap;border:1px solid transparent;transition:background .2s,color .2s,border-color .2s,transform .2s}
.nav-link:hover{background:var(--sf-blue-50);color:var(--sf-blue-700);transform:translateY(-1px)}
.nav-link.active{background:var(--grad-blue);color:#fff;font-weight:600;box-shadow:0 4px 10px -4px rgba(47,130,196,.5)}
.nav-link.active:hover{transform:none;color:#fff}
.nav-link.sheet,.nav-link.billing{background:#f4f8fd;border-color:#d4e3f3;color:var(--sf-ink);font-weight:600;box-shadow:0 1px 0 rgba(15,23,42,.04),0 2px 6px -3px rgba(47,130,196,.18)}
.nav-link.sheet:hover,.nav-link.billing:hover{transform:translateY(-1px);box-shadow:0 4px 12px -4px rgba(47,130,196,.35)}
.nav-link.sheet:active,.nav-link.billing:active{transform:translateY(0);box-shadow:0 1px 0 rgba(15,23,42,.04)}
.nav-link.sheet::before{content:'';display:inline-block;width:8px;height:8px;border-radius:2px;flex-shrink:0;background:#34a853}
.nav-link.billing{background:#e6f4ea;border-color:#b8dfc3;color:#137333}
.nav-link.billing:hover{background:#d4ecdc;color:#0d5723;border-color:#9bd1ac}
.nav-link svg{flex-shrink:0;opacity:.85}
.nav-link.active svg{opacity:1}

@media (max-width:980px){
  .dash-header{padding:12px 18px;gap:12px}
  .dash-meta{margin-left:0;width:100%;justify-content:flex-start;gap:10px}
  main.dash{padding:8px 18px 60px}
  .summary-strip{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:700px){
  .dash-header{gap:10px;padding:12px 14px}
  .dash-brand img{height:36px}
  .dash-title{font-size:13px;letter-spacing:.2em;padding-left:12px}
  main.dash{padding:8px 14px 60px}
  .dash-nav{padding:8px 10px;gap:4px}
  .nav-divider{margin:0 4px}
  .nav-group-label{font-size:9.5px;padding:0 4px 0 0}
  .nav-link{padding:8px 12px;font-size:12.5px;min-height:38px}
  .filter-row{flex-direction:column;align-items:stretch;gap:8px;width:100%;min-width:0}
  .filter{display:flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px;width:100%;max-width:100%;min-width:0}
  .filter::-webkit-scrollbar{display:none}
  .filter button{flex-shrink:0;white-space:nowrap;padding:10px 14px;font-size:11.5px;min-height:40px}
  /* Tables: wrap each .lunch in a scroll container via the week-block itself */
  .week-block{padding:14px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .week-h{flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .week-h .week-title{font-size:13px}
  table.lunch{font-size:12px;min-width:480px}
  table.lunch thead th{font-size:10px;padding:6px 6px}
  table.lunch tbody td{padding:6px 6px;font-size:12px}
  table.lunch tbody td:first-child{padding-left:8px;white-space:normal;line-height:1.3}
  table.lunch .cat-tag{margin-right:5px;padding:2px 5px;font-size:8.5px}
  .summary-card{padding:14px 14px}
  .summary-card h3{font-size:10px}
}
@media (max-width:520px){
  .summary-strip{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .summary-card .num{font-size:26px}
  .summary-card .sub{font-size:11px}
  .week-block{padding:12px 10px}
  table.lunch{min-width:440px}
  table.lunch thead th{font-size:9.5px;padding:6px 4px;letter-spacing:.1em}
  table.lunch tbody td{padding:6px 4px;font-size:11.5px}
  /* Drop the long sub-type label to two lines on phones rather than crushing days */
  table.lunch tbody td:first-child{white-space:normal;line-height:1.3;padding-left:6px}
}

/* ====== Auth (login card, header user area) ====== */
.auth-backdrop{position:fixed;inset:0;z-index:9000;background:rgba(10,16,40,.5);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.auth-card{background:var(--sf-white);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:36px 32px 28px;width:360px;max-width:92vw}
.auth-brand{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.auth-brand img{height:48px}
.auth-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sf-ink)}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--sf-cream);border-radius:8px;padding:3px;border:1px solid var(--sf-border)}
.auth-tab{flex:1;padding:8px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--sf-ink-50);transition:all .15s;text-align:center}
.auth-tab.active{background:var(--sf-white);color:var(--sf-blue-700);box-shadow:0 1px 3px rgba(15,23,42,.08)}
.auth-label{display:block;font-size:12px;font-weight:600;color:var(--sf-ink-60);letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px}
.auth-input{display:block;width:100%;margin-top:5px;padding:10px 12px;border:1px solid var(--sf-border);border-radius:8px;font-size:14px;background:var(--sf-white);transition:border-color .15s}
.auth-input:focus{outline:none;border-color:var(--sf-blue-700)}
.auth-submit{display:block;width:100%;padding:12px;border-radius:8px;background:var(--grad-blue);color:#fff;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;margin-top:4px;transition:opacity .15s}
.auth-submit:hover{opacity:.9}
.auth-feedback{font-size:12px;margin-top:12px;text-align:center;min-height:18px;color:var(--sf-ink-50)}
.auth-feedback.error{color:var(--sf-red)}
.auth-feedback.success{color:var(--sf-green)}
.auth-skip{display:block;width:100%;text-align:center;margin-top:12px;font-size:12px;color:var(--sf-ink-40);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif}
.auth-skip:hover{color:var(--sf-ink-60)}
.auth-signin-btn{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:7px 13px;border-radius:6px;background:var(--sf-blue-50);color:var(--sf-blue-700);transition:background .2s;border:none;cursor:pointer}
.auth-signin-btn:hover{background:var(--sf-blue-100)}
.auth-user-name{font-family:'Space Grotesk','Inter',monospace;font-size:12.5px;font-weight:600;color:var(--sf-ink)}
.auth-badge{font-family:'Inter',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:4px}
.auth-badge.admin{background:#fef3c7;color:#92400e}
.auth-badge.staff{background:var(--sf-blue-100);color:var(--sf-blue-700)}
.auth-signout-btn{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:var(--sf-ink-40);text-decoration:underline;cursor:pointer;background:none;border:none}
.auth-signout-btn:hover{color:var(--sf-ink-60)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./auth.js"></script>
</head>
<body>
<div id="auth-card-root"></div>

<header class="dash-header">
  <a class="dash-brand" href="../funnel/home.html" title="Back to Systema Floyd home">
    <img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/5d66f583-c02a-4140-91aa-5f3362ec9b01.png" alt="Systema Floyd" />
  </a>
  <span class="dash-title">Dashboard</span>
  <div id="user-area" class="dash-meta" style="gap:8px"></div>
  <div class="dash-meta">
    <span class="dot" title="Live data via private integration"></span>
    <span>Updated <span id="updated-at">,</span></span>
  </div>
</header>

<main class="dash">

  <!-- Dashboard nav: Pages | Sheets | Docs -->
  <nav class="dash-nav" aria-label="Dashboard navigation">
    <div class="nav-group">
      <span class="nav-group-label">Pages</span>
      <a class="nav-link" href="./">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 10h18M9 21V10"/></svg>
        Registrations
      </a>
      <a class="nav-link active" href="./lunches.html" aria-current="page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12a10 10 0 0 1 20 0z"/><path d="M2 12h20M7 12V7M12 12V5M17 12V7"/></svg>
        Lunches
      </a>
    </div>
    <span class="nav-divider"></span>
    <div class="nav-group">
      <span class="nav-group-label">Sheets</span>
      <a class="nav-link sheet" href="https://docs.google.com/spreadsheets/d/1qejcgNQt3sS_UZ9Gl9Txr8TOocw3LzK5PjPICqnRrGA/edit" target="_blank" rel="noopener">PAID Upper</a>
      <a class="nav-link sheet" href="https://docs.google.com/spreadsheets/d/18A_sc917xnxYo3UQ8_cGogqg46Im6qUQlakOC9Oc-Fs/edit" target="_blank" rel="noopener">PAID Lower</a>
      <a class="nav-link sheet" href="https://docs.google.com/spreadsheets/d/1rK4p6jS1xqSf1qNO9-3ljCRzJcUIDF87sNo_UehBWYQ/edit" target="_blank" rel="noopener">FREE Upper</a>
      <a class="nav-link sheet" href="https://docs.google.com/spreadsheets/d/1_659v7by990V4OJMd86nBG-HUN6_AzZNOAPoQN0LMxY/edit" target="_blank" rel="noopener">FREE Lower</a>
    </div>
    <span class="nav-divider"></span>
    <div class="nav-group">
      <span class="nav-group-label">Billing</span>
      <a class="nav-link billing" href="https://docs.google.com/spreadsheets/d/1VKwy29-ah7AznrcKs5aGqVKdIuOkCWO6JMUfonas2bM/edit?gid=1693204858#gid=1693204858" target="_blank" rel="noopener">💵 Billing Dashboard</a>
    </div>
  </nav>

  <div class="filter-row">
    <span class="lbl">Camp</span>
    <div class="filter" role="tablist" id="camp-filter">
      <button data-filter="summer" class="active" role="tab" aria-selected="true">Summer Camp</button>
      <button data-filter="free" role="tab" aria-selected="false">Free Camp</button>
      <button data-filter="afterschool" role="tab" aria-selected="false">After-School</button>
    </div>
  </div>

  <div id="loading" class="empty-week">Loading lunch data…</div>
  <div id="error-box" class="error" hidden></div>

  <section class="summary-strip" id="summary" hidden></section>

  <div id="weeks"></div>

</main>

<script>
(async () => {
  await SF_AUTH.init('lunches');
  const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri'];
  const state = {
    snapshot: null,
    filter: 'summer',
  };

  function fmtUpdatedAt(iso) {
    if (!iso) return ',';
    try {
      const d = new Date(iso);
      return d.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true,
      });
    } catch { return iso; }
  }

  function shortenWeek(w) {
    return String(w || '')
      .replace(/(\w{3})\w*\s+(\d+)\w{2}-(?:\w{3,}\s+)?(\d+)\w{2}/, (_, m, a, b) => `${m} ${a}–${b}`)
      .replace(/(\w{3})\w*\s+(\d+)\w{2}\s*-\s*(\w{3})\w*\s+(\d+)\w{2}/, (_, m1, a, m2, b) => `${m1} ${a}–${m2} ${b}`);
  }

  function setActiveFilter(f) {
    state.filter = f;
    document.querySelectorAll('#camp-filter button').forEach(b => {
      const on = b.dataset.filter === f;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    render();
  }

  function getLunchSlice() {
    const lunches = state.snapshot && state.snapshot.lunches;
    if (!lunches) return null;
    if (state.filter === 'summer') return lunches.summer || null;
    if (state.filter === 'free')   return lunches.free   || null;
    return null; // after-school not yet wired
  }

  function categorySummary(slice, weekOrder) {
    const cats = { pizza: 0, celis: 0, breakfast: 0, other: 0 };
    let totalLunches = 0;
    weekOrder.forEach(w => {
      const wk = slice[w]; if (!wk) return;
      wk.rows.forEach(r => {
        if (cats.hasOwnProperty(r.category)) cats[r.category] += r.total;
        if (r.category !== 'none') totalLunches += r.total;
      });
    });
    return { cats, totalLunches };
  }

  function renderSummary(slice, weekOrder) {
    const el = document.getElementById('summary');
    if (!slice) { el.hidden = true; return; }
    const { cats, totalLunches } = categorySummary(slice, weekOrder);
    el.hidden = false;
    el.innerHTML = `
      <div class="summary-card">
        <h3>Total lunches</h3>
        <div class="num">${totalLunches}</div>
        <div class="sub">across all weeks</div>
      </div>
      <div class="summary-card">
        <h3>Pizza orders</h3>
        <div class="num">${cats.pizza}</div>
        <div class="sub">student-day count</div>
      </div>
      <div class="summary-card">
        <h3>Celis specialty</h3>
        <div class="num">${cats.celis}</div>
        <div class="sub">student-day count</div>
      </div>
      <div class="summary-card">
        <h3>Other / unclassified</h3>
        <div class="num">${cats.other}</div>
        <div class="sub">spot-check entries</div>
      </div>`;
  }

  function categoryLabel(c) {
    return ({ pizza:'Pizza', celis:'Celis specialty', breakfast:'Breakfast',
              none:'No lunch', other:'Other' })[c] || c;
  }

  function renderWeek(weekLabel, wk) {
    const total = wk && wk.totals ? wk.totals.all : 0;
    const byDay = wk && wk.totals ? wk.totals.byDay : {};
    if (!wk || !wk.rows || wk.rows.length === 0) {
      return `<div class="week-block">
        <div class="week-h">
          <span class="week-title">${shortenWeek(weekLabel)} <small style="font-family:'Inter',sans-serif;font-size:11px;color:var(--sf-ink-50);font-weight:400;letter-spacing:.04em;text-transform:none">(${weekLabel})</small></span>
          <span class="week-count">0 student-day lunches</span>
        </div>
        <div class="empty-week">No lunch orders yet for this week.</div>
      </div>`;
    }

    // Group rows by category to insert category-header bands.
    const groups = {};
    const order = [];
    wk.rows.forEach(r => {
      if (!groups[r.category]) { groups[r.category] = []; order.push(r.category); }
      groups[r.category].push(r);
    });

    const tbody = order.map(cat => {
      const rows = groups[cat];
      const catTotal = rows.reduce((s, r) => s + r.total, 0);
      const catByDay = rows.reduce((m, r) => {
        DAYS_SHORT.forEach(d => { m[d] = (m[d] || 0) + (r.byDay[d] || 0); });
        return m;
      }, {});
      const catRow = `<tr class="cat-hdr"><td>${categoryLabel(cat)}</td>${
        DAYS_SHORT.map(d => `<td>${catByDay[d] || 0}</td>`).join('')
      }<td>${catTotal}</td></tr>`;
      const subRows = rows.map((r, idx) => {
        const tag = `<span class="cat-tag ${cat}">${cat[0].toUpperCase()}</span>`;
        const rowId = `lr-${weekLabel.replace(/[^a-zA-Z0-9]/g,'')}-${cat}-${idx}`;
        const studentsJson = encodeURIComponent(JSON.stringify(r.students || []));
        const main = `<tr class="lunch-row" data-row-id="${rowId}" data-students="${studentsJson}"><td>${tag}${escapeHtml(r.label)}</td>${
          DAYS_SHORT.map(d => {
            const n = r.byDay[d] || 0;
            return `<td class="${n === 0 ? 'zero' : ''}">${n}</td>`;
          }).join('')
        }<td class="col-total">${r.total}</td></tr>`;
        const detail = `<tr class="lunch-detail" data-detail-for="${rowId}"><td colspan="7"><div class="lunch-detail-body" data-detail-slot></div></td></tr>`;
        return main + detail;
      }).join('');
      return catRow + subRows;
    }).join('') + `<tr class="totals"><td>Total</td>${
      DAYS_SHORT.map(d => `<td>${byDay[d] || 0}</td>`).join('')
    }<td>${total}</td></tr>`;

    return `<div class="week-block">
      <div class="week-h">
        <span class="week-title">${shortenWeek(weekLabel)} <small style="font-family:'Inter',sans-serif;font-size:11px;color:var(--sf-ink-50);font-weight:400;letter-spacing:.04em;text-transform:none">(${weekLabel})</small></span>
        <span class="week-count">${total} student-day lunches</span>
      </div>
      <table class="lunch">
        <thead><tr>
          <th>Lunch order</th>
          <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th>
          <th>Total</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function render() {
    const weeksEl = document.getElementById('weeks');
    if (!state.snapshot) return;
    const sliceForOrder = state.filter === 'free' ? state.snapshot.free
                        : state.filter === 'summer' ? state.snapshot.summer
                        : null;
    const weekOrder = (sliceForOrder && Array.isArray(sliceForOrder.weekOrder) && sliceForOrder.weekOrder.length)
                      ? sliceForOrder.weekOrder
                      : (state.snapshot.weekOrder || []);

    if (state.filter === 'afterschool') {
      document.getElementById('summary').hidden = true;
      weeksEl.innerHTML = `<div class="week-block"><div class="empty-week">After-school lunch tracking will activate when the AS sheets are created. Until then, this tab is intentionally empty.</div></div>`;
      return;
    }

    const slice = getLunchSlice();
    renderSummary(slice, weekOrder);

    if (!slice) {
      weeksEl.innerHTML = `<div class="week-block"><div class="empty-week">No lunch data available for this camp yet.</div></div>`;
      return;
    }

    weeksEl.innerHTML = weekOrder.map(w => renderWeek(w, slice[w])).join('');
    wireLunchRowClicks();
  }

  function wireLunchRowClicks() {
    const root = document.getElementById('weeks');
    if (!root || root.dataset.wired === '1') return;
    root.dataset.wired = '1';
    const dayLabels = ['Mon','Tue','Wed','Thu','Fri'];
    function pipForType(s) {
      if (s.type === 'free') return 'free';
      if (s.campus === 'Upper Campus') return 'upper';
      if (s.campus === 'Lower Campus') return 'lower';
      return 'unknown';
    }
    root.addEventListener('click', e => {
      const row = e.target.closest('tr.lunch-row');
      if (!row) return;
      const id = row.getAttribute('data-row-id');
      const detail = root.querySelector(`tr.lunch-detail[data-detail-for="${id}"]`);
      if (!detail) return;
      const opening = !row.classList.contains('open');
      // Close any other open detail in the SAME week, keep cross-week opens
      const tbody = row.parentElement;
      tbody.querySelectorAll('tr.lunch-row.open').forEach(other => {
        if (other === row) return;
        other.classList.remove('open');
        const d = tbody.querySelector(`tr.lunch-detail[data-detail-for="${other.getAttribute('data-row-id')}"]`);
        if (d) { d.classList.remove('open'); const slot = d.querySelector('[data-detail-slot]'); if (slot) slot.innerHTML = ''; }
      });
      if (opening) {
        let students = [];
        try { students = JSON.parse(decodeURIComponent(row.getAttribute('data-students') || '[]')); } catch (err) {}
        const slot = detail.querySelector('[data-detail-slot]');
        if (slot) slot.innerHTML = buildLunchDetailHTML(students, dayLabels, pipForType);
        row.classList.add('open');
        detail.classList.add('open');
      } else {
        row.classList.remove('open');
        detail.classList.remove('open');
        const slot = detail.querySelector('[data-detail-slot]');
        if (slot) slot.innerHTML = '';
      }
    });
  }

  function buildLunchDetailHTML(students, dayLabels, pipFor) {
    if (!students || !students.length) {
      return `<div class="lunch-detail-empty">No students linked to this lunch order yet, wait for the next snapshot refresh.</div>`;
    }
    const h = `<div class="lunch-detail-h">${students.length} student${students.length===1?'':'s'} ordered this lunch</div>`;
    const items = students.map(s => {
      const pip = pipFor(s);
      const sDays = Array.isArray(s.days) ? s.days : [];
      const dayChips = dayLabels.map(d => `<span class="${sDays.indexOf(d) >= 0 ? 'on' : ''}">${d[0]}</span>`).join('');
      return `<li><span class="pip ${pip}"></span><span class="nm">${escapeHtml(s.name)}</span><span class="days">${dayChips}</span></li>`;
    }).join('');
    const hint = `<div class="lunch-detail-hint">Filled day chips show the days each student is attending camp that week.</div>`;
    return h + `<ul class="lunch-detail-list">${items}</ul>` + hint;
  }

  async function load() {
    try {
      const r = await fetch('./snapshot.json?_=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) throw new Error('snapshot.json not found (' + r.status + ')');
      state.snapshot = await r.json();
      document.getElementById('loading').remove();
      document.getElementById('updated-at').textContent = fmtUpdatedAt(state.snapshot.generatedAt);
      render();
    } catch (e) {
      const eb = document.getElementById('error-box');
      eb.hidden = false;
      eb.textContent = 'Failed to load: ' + e.message;
      const ld = document.getElementById('loading'); if (ld) ld.remove();
    }
  }

  document.querySelectorAll('#camp-filter button').forEach(b => {
    b.addEventListener('click', () => setActiveFilter(b.dataset.filter));
  });

  load();
})();
</script>
</body>
</html>
