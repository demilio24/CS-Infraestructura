<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nils Digital Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--surface:#f9fafb;--surface2:#f3f4f6;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--blue:#3b82f6;--blue-dim:#dbeafe;--green:#22c55e;--green-dim:#dcfce7;--red:#ef4444;--red-dim:#fee2e2;--yellow:#eab308;--radius:10px}
body{font-family:'Instrument Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:24px;font-size:14px;line-height:1.5}
.wrap{max-width:1200px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:20px;font-weight:700}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.fbtn:hover{border-color:var(--blue);color:var(--text)}
.fbtn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.refresh-info{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:2px;flex-wrap:wrap}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.refresh-hint{font-size:10px;color:var(--muted);opacity:.6}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.kpi-compare{display:flex;align-items:center;gap:8px}
.kpi-col{flex:1}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-who{font-size:10px;color:var(--muted);margin-top:3px}
.kpi-col.me .kpi-val{color:var(--blue)}
.kpi-col.them .kpi-val{color:var(--muted)}
.kpi-vs{font-size:10px;color:var(--border);font-weight:600}
.section-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px}
.period-label{font-weight:400;opacity:.6}
.refresh-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;text-decoration:none;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue);text-decoration:none}
.hdr-controls{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.control-row{display:flex;gap:8px;align-items:center}
.control-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.comp-select{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;appearance:auto}
.comp-select:hover{border-color:var(--blue)}
.inactive-note{font-size:9px;opacity:.5;font-weight:400}
.kpi-na{font-size:18px;color:var(--border)}
.activity-section{margin-bottom:16px;overflow:visible}
.grid-wrap{overflow-x:auto;overflow-y:visible;padding-top:28px;padding-bottom:2px}
.activity-grid{display:flex;gap:2px;max-height:40px;overflow:visible}
.week-col{display:flex;flex-direction:column;gap:2px;flex:1;overflow:visible}
.day-cell{width:100%;aspect-ratio:1;max-height:5px;min-width:4px;border-radius:1px;background:var(--surface2);position:relative;cursor:default;overflow:visible}
.day-cell[data-level="1"]{background:#bfdbfe}
.day-cell[data-level="2"]{background:#60a5fa}
.day-cell[data-level="3"]{background:#3b82f6}
.day-cell[data-level="4"]{background:#1d4ed8}
.day-cell .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:4px 8px;border-radius:6px;font-size:10px;white-space:nowrap;z-index:10;pointer-events:none}
.day-cell:hover .tip{display:block}
.grid-legend{display:flex;align-items:center;gap:3px;margin-top:4px;font-size:9px;color:var(--muted)}
.grid-legend .swatch{width:8px;height:8px;border-radius:1px}
.posts-section{margin-bottom:20px}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:7px 12px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(59,130,246,.04)}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.hook-td{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.perf-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.perf-dot.high{background:var(--green)}.perf-dot.mid{background:var(--yellow)}.perf-dot.low{background:var(--red)}
@media(max-width:640px){body{padding:12px}.kpis{grid-template-columns:repeat(2,1fr)}.kpi{padding:10px 12px}.kpi-val{font-size:18px}.hdr{flex-direction:column;gap:8px}.hdr h1{font-size:18px}.filters{width:100%}.activity-grid{max-height:30px}.tbl-wrap{font-size:11px}th,td{padding:5px 8px}.hook-td{max-width:140px}}
</style>
</head>

// Client-side dashboard rendering
var MY = DATA.myAccount;

// Build competitor list from data
var compList = [];
var rawComp = DATA.competitors;
var compReelsMap = {};
var ck = Object.keys(rawComp);
for (var i = 0; i < ck.length; i++) {
  var val = rawComp[ck[i]];
  var arr = Array.isArray(val) ? val : (val.reels || []);
  if (arr.length > 0) {
    compList.push(ck[i]);
    compReelsMap[ck[i]] = prepReels(arr);
  }
}
var activeComp = compList.length > 0 ? compList[0] : null;

function prepReels(arr) {
  return arr.map(function(r) {
    var copy = Object.assign({}, r);
    copy._date = r.timestamp ? r.timestamp.split('T')[0] : '';
    return copy;
  }).sort(function(a, b) { return a.timestamp < b.timestamp ? -1 : 1; });
}

var myReels = prepReels(DATA.myReels);

var today = new Date(DATA.date + 'T12:00:00');
function daysAgo(d, n) { var x = new Date(d); x.setDate(x.getDate() - n); return x; }
function fmtDate(d) { return d.toISOString().split('T')[0]; }
function filterReels(arr, days) {
  if (days === 0) return arr;
  var cutoff = fmtDate(daysAgo(today, days));
  return arr.filter(function(r) { return r._date >= cutoff; });
}
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function num(n) { return n.toLocaleString(); }

var currentFilter = 0;

function calcStats(arr) {
  var n = arr.length;
  if (!n) return { posts: 0, totalViews: 0, avgViews: 0, totalLikes: 0, totalComments: 0, avgEng: 0, avgDur: 0 };
  var tv = arr.reduce(function(s, r) { return s + r.views; }, 0);
  var tl = arr.reduce(function(s, r) { return s + r.likes; }, 0);
  var tc = arr.reduce(function(s, r) { return s + r.comments; }, 0);
  var ae = +(arr.reduce(function(s, r) { return s + r.engagement; }, 0) / n).toFixed(2);
  var ad = +(arr.reduce(function(s, r) { return s + r.duration; }, 0) / n).toFixed(0);
  return { posts: n, totalViews: tv, avgViews: Math.round(tv / n), totalLikes: tl, totalComments: tc, avgEng: ae, avgDur: ad };
}

function render() {
  var compReels = activeComp ? compReelsMap[activeComp] : [];
  var myFiltered = filterReels(myReels, currentFilter);
  var compFiltered = filterReels(compReels, currentFilter);
  var mySt = calcStats(myFiltered);
  var compSt = calcStats(compFiltered);

  // Activity Grid (compact)
  var gridDays = 91;
  var postMap = {};
  var viewMap = {};
  myReels.forEach(function(r) {
    if (!r._date) return;
    postMap[r._date] = (postMap[r._date] || 0) + 1;
    viewMap[r._date] = (viewMap[r._date] || 0) + r.views;
  });
  var viewValues = Object.values(viewMap);
  var maxDayViews = viewValues.length > 0 ? Math.max.apply(null, viewValues) : 1;
  if (maxDayViews < 1) maxDayViews = 1;

  var startDate = daysAgo(today, gridDays - 1);
  var alignedStart = daysAgo(startDate, startDate.getDay());
  var weeks = [];
  var cur = new Date(alignedStart);
  var weekCol = [];

  while (cur <= today || weekCol.length > 0) {
    var d = fmtDate(cur);
    var inRange = cur >= daysAgo(today, gridDays - 1) && cur <= today;
    var count = postMap[d] || 0;
    var views = viewMap[d] || 0;
    var level = !inRange ? -1 : count === 0 ? 0 : views <= maxDayViews * 0.25 ? 1 : views <= maxDayViews * 0.5 ? 2 : views <= maxDayViews * 0.75 ? 3 : 4;

    if (inRange || cur <= today) {
      if (level === -1) {
        weekCol.push('<div class="day-cell" style="visibility:hidden"></div>');
      } else {
        weekCol.push('<div class="day-cell" data-count="' + count + '" data-level="' + level + '"><span class="tip">' + d + ': ' + count + ' post' + (count !== 1 ? 's' : '') + ', ' + num(views) + ' views</span></div>');
      }
    }

    if (weekCol.length === 7 || cur > today) {
      while (weekCol.length < 7) weekCol.push('<div class="day-cell" style="visibility:hidden"></div>');
      weeks.push('<div class="week-col">' + weekCol.join('') + '</div>');
      weekCol = [];
      if (cur > today) break;
    }
    cur.setDate(cur.getDate() + 1);
  }

  var gridHtml = '<div class="activity-grid">' + weeks.join('') + '</div>';
  gridHtml += '<div class="grid-legend"><span>Less</span><div class="swatch" style="background:var(--surface2)"></div><div class="swatch" style="background:#bfdbfe"></div><div class="swatch" style="background:#60a5fa"></div><div class="swatch" style="background:#3b82f6"></div><div class="swatch" style="background:#1d4ed8"></div><span>More</span></div>';

  // Posts table
  var sortedFiltered = myFiltered.slice().sort(function(a, b) { return b.timestamp < a.timestamp ? -1 : 1; });
  var filteredViews = myFiltered.map(function(r) { return r.views; });
  var maxV = filteredViews.length > 0 ? Math.max.apply(null, filteredViews) : 1;
  var postsHtml = sortedFiltered.map(function(r) {
    var perf = r.views >= maxV * 0.6 ? 'high' : r.views >= maxV * 0.25 ? 'mid' : 'low';
    var dur = r.duration ? Math.round(r.duration) + 's' : '-';
    return '<tr><td>' + (r._date || '-') + '</td><td><span class="perf-dot ' + perf + '"></span>' + num(r.views) + '</td><td>' + r.likes + '</td><td>' + r.comments + '</td><td>' + r.engagement + '%</td><td>' + dur + '</td><td class="hook-td" title="' + esc(r.hook) + '">' + esc(r.hook) + '</td><td><a href="' + r.url + '" target="_blank">View</a></td></tr>';
  }).join('');

  if (!postsHtml) {
    postsHtml = '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px">No posts in this period</td></tr>';
  }

  // Filter buttons
  var filterBtns = [7, 14, 30, 90, 0].map(function(d) {
    var label = d === 0 ? 'All' : d + 'd';
    var cls = currentFilter === d ? 'fbtn active' : 'fbtn';
    return '<button class="' + cls + '" onclick="setFilter(' + d + ')">' + label + '</button>';
  }).join('');

  // Competitor selector
  var compOptions = compList.map(function(name) {
    var sel = name === activeComp ? ' selected' : '';
    return '<option value="' + name + '"' + sel + '>@' + name + '</option>';
  }).join('');
  var compSelector = '<select class="comp-select" onchange="setComp(this.value)">' + compOptions + '</select>';

  // KPI cards
  var compNote = compSt.posts === 0 && currentFilter > 0 ? ' <span class="inactive-note">(inactive)</span>' : '';
  function kpi(label, myVal, compVal) {
    var myStr = typeof myVal === 'number' ? num(myVal) : myVal;
    var compStr = typeof compVal === 'number' ? num(compVal) : compVal;
    var themVal = compSt.posts === 0 && currentFilter > 0 ? '<span class="kpi-na">--</span>' : compStr;
    return '<div class="kpi">' +
      '<div class="kpi-label">' + label + '</div>' +
      '<div class="kpi-compare">' +
        '<div class="kpi-col me"><div class="kpi-val">' + myStr + '</div><div class="kpi-who">You</div></div>' +
        '<div class="kpi-vs">vs</div>' +
        '<div class="kpi-col them"><div class="kpi-val">' + themVal + '</div><div class="kpi-who">' + (activeComp ? '@' + activeComp : '--') + compNote + '</div></div>' +
      '</div>' +
    '</div>';
  }

  var periodLabel = currentFilter > 0 ? 'past ' + currentFilter + ' days' : 'all time';
