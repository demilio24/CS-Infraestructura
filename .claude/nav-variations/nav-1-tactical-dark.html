<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nav Variation 1 — Tactical Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--navy-900:#0a1028;--navy-800:#111a3d;--navy-700:#1a2554;--blue-700:#1b2f6e;--blue-500:#2f82c4;--blue-400:#4aa3e0;--gold:#d4af37;--gold-light:#f1d068;--red-500:#dc2626;--white:#fff;--ink:#0d1534}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--white);color:var(--ink)}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
h1,h2,h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.01em;margin:0}

/* ======= TACTICAL DARK NAV ======= */
.nav-1{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,#0a1028 0%,#111a3d 100%);
  border-bottom:1px solid rgba(212,175,55,.25);
  box-shadow:0 2px 24px rgba(0,0,0,.25);
  padding:14px 32px;
  position:relative;
}
.nav-1::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 20%,var(--gold) 80%,transparent);
  opacity:.5;
}
.nav-1-inner{
  max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:24px;
}
.nav-1-left,.nav-1-right{display:flex;align-items:center;gap:4px}
.nav-1-right{justify-content:flex-end}
.nav-1-link{
  color:rgba(255,255,255,.85);
  font-family:'Oswald',sans-serif;
  font-size:13px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  padding:10px 16px;border-radius:4px;
  transition:color .2s,background .2s;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-1-link::before{
  content:'';display:inline-block;
  width:0;height:0;border:5px solid transparent;border-left-color:var(--gold);
  margin-right:4px;opacity:.5;transition:opacity .2s,transform .2s;
}
.nav-1-link:hover{color:var(--gold-light)}
.nav-1-link:hover::before{opacity:1;transform:translateX(2px)}

/* Centered logo */
.nav-1-logo{
  display:flex;align-items:center;gap:14px;
  padding:4px 20px;
  position:relative;
}
.nav-1-logo::before,.nav-1-logo::after{
  content:'';display:block;
  width:0;height:0;
  border:6px solid transparent;
}
.nav-1-logo::before{border-right-color:var(--gold)}
.nav-1-logo::after{border-left-color:var(--gold)}
.nav-1-logo img{height:64px;width:auto;filter:drop-shadow(0 2px 14px rgba(74,163,224,.7))}

/* CTA */
.nav-1-cta{
  background:linear-gradient(135deg,var(--gold-light),var(--gold));
  color:var(--navy-900) !important;
  padding:10px 20px !important;
  font-weight:700 !important;
  border-radius:4px;
  box-shadow:0 6px 18px -6px rgba(212,175,55,.6);
  transition:transform .2s,box-shadow .2s;
}
.nav-1-cta:hover{transform:translateY(-2px);box-shadow:0 10px 28px -6px rgba(212,175,55,.8)}
.nav-1-cta::before{display:none !important}

/* Dropdown with pictures */
.nav-1-dropdown{position:relative}
.nav-1-dropdown-menu{
  position:absolute;top:calc(100% + 8px);left:50%;transform:translate(-50%,-8px);
  background:var(--navy-800);border:1px solid rgba(212,175,55,.3);
  border-radius:8px;padding:10px;
  min-width:620px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  opacity:0;visibility:hidden;transition:all .25s;
}
.nav-1-dropdown:hover .nav-1-dropdown-menu{opacity:1;visibility:visible;transform:translate(-50%,0)}
.nav-1-dropdown-item{
  display:flex;flex-direction:column;gap:6px;
  padding:10px;border-radius:6px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  transition:all .2s;
}
.nav-1-dropdown-item:hover{background:rgba(212,175,55,.1);border-color:var(--gold)}
.nav-1-dropdown-thumb{
  aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#000;
}
.nav-1-dropdown-thumb img{width:100%;height:100%;object-fit:cover}
.nav-1-dropdown-title{
  font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;
  color:var(--white);text-transform:uppercase;letter-spacing:.04em;
  margin-top:2px;
}
.nav-1-dropdown-sub{font-size:11px;color:rgba(255,255,255,.6);line-height:1.3}

/* Mobile toggle */
.nav-1-toggle{display:none;width:44px;height:44px;border-radius:4px;
  background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.3);
  align-items:center;justify-content:center}
.nav-1-toggle span,.nav-1-toggle span::before,.nav-1-toggle span::after{
  display:block;width:20px;height:2px;background:var(--gold-light);position:relative;
}
.nav-1-toggle span::before,.nav-1-toggle span::after{content:'';position:absolute;left:0;right:0}
.nav-1-toggle span::before{top:-6px}
.nav-1-toggle span::after{top:6px}

@media (max-width:900px){
  .nav-1{padding:10px 16px}
  .nav-1-inner{grid-template-columns:44px 1fr 44px;gap:0}
  .nav-1-left,.nav-1-right{display:none !important}
  .nav-1-toggle{display:flex;grid-column:3}
  .nav-1-inner::before{content:'';grid-column:1;width:44px}
  .nav-1-logo{grid-column:2;justify-self:center;padding:0}
  .nav-1-logo img{height:48px}
  .nav-1-logo::before,.nav-1-logo::after{display:none}
}

/* Demo hero under nav */
.demo-hero{
  padding:130px 32px 80px;text-align:center;
  background:linear-gradient(135deg,#1b2f6e,#0a1028);
  color:var(--white);
  min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
  position:relative;overflow:hidden;
}
.demo-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 30%,rgba(47,130,196,.25),transparent 60%),
             radial-gradient(ellipse at 80% 70%,rgba(185,28,28,.15),transparent 60%);
}
.demo-hero h1{position:relative;font-size:clamp(36px,6vw,64px);line-height:.95;margin-bottom:16px}
.demo-hero h1 .accent{color:var(--gold-light)}
.demo-hero p{position:relative;font-size:17px;color:rgba(255,255,255,.78);max-width:560px;margin:0 auto}
</style>
</head>
<body>

<nav class="nav-1">
  <div class="nav-1-inner">
    <div class="nav-1-left">
      <div class="nav-1-dropdown">
        <button class="nav-1-link" type="button">Programs</button>
        <div class="nav-1-dropdown-menu">
          <a class="nav-1-dropdown-item" href="#">
            <div class="nav-1-dropdown-thumb"><img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/dead9e1c-b720-4d7b-9795-6c1eca9652eb.jpg" alt="" /></div>
            <div class="nav-1-dropdown-title">After School</div>
            <div class="nav-1-dropdown-sub">On-campus martial arts, 5 locations</div>
          </a>
          <a class="nav-1-dropdown-item" href="#">
            <div class="nav-1-dropdown-thumb"><img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/9f6e9e68-bfe3-4c06-9e0d-6cb868640361.png" alt="" /></div>
            <div class="nav-1-dropdown-title">Camps</div>
            <div class="nav-1-dropdown-sub">Full-day, summer + breaks</div>
          </a>
          <a class="nav-1-dropdown-item" href="#">
            <div class="nav-1-dropdown-thumb"><img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/ad436bea-070b-42f7-a748-97719ac56033.jpg" alt="" /></div>
            <div class="nav-1-dropdown-title">Spirit Dance</div>
            <div class="nav-1-dropdown-sub">Pom, hip-hop, team spirit</div>
          </a>
        </div>
      </div>
      <a class="nav-1-link" href="#">Campuses</a>
    </div>

    <a class="nav-1-logo" href="#" aria-label="Systema Floyd home">
      <img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/a901fa29-7a82-44e2-af3c-4774fa9db5f5.png" alt="Systema Floyd" />
    </a>

    <div class="nav-1-right">
      <a class="nav-1-link" href="#">About</a>
      <a class="nav-1-link" href="#">Contact</a>
      <a class="nav-1-link nav-1-cta" href="#">Get Started · First Class Free</a>
    </div>

    <button class="nav-1-toggle" aria-label="Menu"><span></span></button>
  </div>
</nav>

<section class="demo-hero">
  <h1>Raise a <span class="accent">Warrior.</span></h1>
  <p>Variation 1 — Tactical Dark. Gold triangle accents, dark navy bar, uppercase tactical links.</p>
</section>
</body></html>
