<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nav Variation 7 — Tactical Neon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--navy-900:#0a1028;--navy-800:#111a3d;--blue-700:#1b2f6e;--blue-500:#2f82c4;--blue-400:#4aa3e0;--blue-300:#7dd3fc;--neon:#3dd6ff;--white:#fff}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--white);color:#0d1534}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
h1,h2,h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.01em;margin:0}

/* ======= TACTICAL NEON ======= */
.nav-7{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,#050816 0%,#0a1028 100%);
  padding:14px 32px;
  box-shadow:0 2px 30px rgba(0,0,0,.4);
  position:relative;overflow:hidden;
}
/* Animated neon scan line traveling left-to-right */
.nav-7::before{
  content:'';position:absolute;left:-20%;top:0;width:40%;height:2px;
  background:linear-gradient(90deg,transparent,var(--neon),transparent);
  filter:blur(1px);
  box-shadow:0 0 12px var(--neon),0 0 24px var(--neon);
  animation:neon-scan 5s linear infinite;
}
@keyframes neon-scan{0%{left:-20%}100%{left:120%}}

/* Grid-dot pattern low opacity */
.nav-7::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(61,214,255,.14) 1px,transparent 1px);
  background-size:24px 24px;
  mask-image:linear-gradient(180deg,black,transparent);
  -webkit-mask-image:linear-gradient(180deg,black,transparent);
}
.nav-7-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px;position:relative;z-index:1}
.nav-7-left,.nav-7-right{display:flex;align-items:center;gap:4px}
.nav-7-right{justify-content:flex-end}
.nav-7-link{
  color:rgba(255,255,255,.88);
  font-family:'Oswald',sans-serif;
  font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  padding:12px 18px;
  position:relative;
  transition:color .2s,text-shadow .2s;
  display:inline-flex;align-items:center;gap:6px;
}
/* Animated neon underline */
.nav-7-link::after{
  content:'';position:absolute;left:18px;right:18px;bottom:6px;height:2px;
  background:linear-gradient(90deg,transparent,var(--neon),transparent);
  transform:scaleX(0);transform-origin:center;
  box-shadow:0 0 10px var(--neon);
  transition:transform .3s var(--ease-out);
}
.nav-7-link:hover{color:var(--neon);text-shadow:0 0 10px rgba(61,214,255,.5)}
.nav-7-link:hover::after{transform:scaleX(1)}

/* Centered logo with neon glow — pulsing */
.nav-7-logo{
  display:flex;align-items:center;gap:12px;padding:4px 20px;position:relative;
}
/* Thin neon rings on either side */
.nav-7-logo::before,.nav-7-logo::after{
  content:'';display:block;width:8px;height:8px;border-radius:50%;
  background:var(--neon);
  box-shadow:0 0 8px var(--neon),0 0 16px var(--neon);
  animation:neon-dot 2s ease-in-out infinite;
}
.nav-7-logo::after{animation-delay:1s}
@keyframes neon-dot{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(.7)}
}
.nav-7-logo img{
  height:64px;width:auto;
  filter:drop-shadow(0 0 14px rgba(61,214,255,.6)) drop-shadow(0 2px 8px rgba(74,163,224,.5));
  animation:logo-glow-7 3s ease-in-out infinite;
}
@keyframes logo-glow-7{
  0%,100%{filter:drop-shadow(0 0 14px rgba(61,214,255,.6)) drop-shadow(0 2px 8px rgba(74,163,224,.5))}
  50%{filter:drop-shadow(0 0 24px rgba(61,214,255,.9)) drop-shadow(0 2px 12px rgba(74,163,224,.7))}
}

/* Neon CTA with animated glow border */
.nav-7-cta{
  background:linear-gradient(135deg,#0ea5e9,#0369a1);
  color:var(--white) !important;
  padding:12px 22px !important;font-weight:700 !important;
  border-radius:4px;
  box-shadow:0 0 0 1px var(--neon),0 0 22px rgba(61,214,255,.35),0 8px 22px -6px rgba(14,165,233,.6);
  transition:all .2s;
  letter-spacing:.08em !important;
  position:relative;
}
.nav-7-cta::after{display:none !important}
.nav-7-cta:hover{transform:translateY(-2px);box-shadow:0 0 0 1px var(--neon),0 0 36px rgba(61,214,255,.6),0 14px 34px -8px rgba(14,165,233,.8)}

/* Dropdown */
.nav-7-dropdown{position:relative}
.nav-7-dropdown-menu{
  position:absolute;top:calc(100% + 8px);left:50%;transform:translate(-50%,-8px);
  background:rgba(10,16,40,.98);border:1px solid rgba(61,214,255,.35);
  padding:10px;min-width:620px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  box-shadow:0 0 40px rgba(61,214,255,.15),0 20px 60px rgba(0,0,0,.6);
  opacity:0;visibility:hidden;transition:all .25s;
}
.nav-7-dropdown-menu::before{content:'';position:absolute;top:-1px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);box-shadow:0 0 10px var(--neon)}
.nav-7-dropdown:hover .nav-7-dropdown-menu{opacity:1;visibility:visible;transform:translate(-50%,0)}
.nav-7-dropdown-item{display:flex;flex-direction:column;gap:6px;padding:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);transition:all .2s}
.nav-7-dropdown-item:hover{background:rgba(61,214,255,.08);border-color:var(--neon);box-shadow:0 0 12px rgba(61,214,255,.25)}
.nav-7-dropdown-thumb{aspect-ratio:4/3;overflow:hidden;background:#000}
.nav-7-dropdown-thumb img{width:100%;height:100%;object-fit:cover}
.nav-7-dropdown-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:var(--white);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.nav-7-dropdown-sub{font-size:11px;color:rgba(255,255,255,.6)}

/* Mobile */
.nav-7-toggle{display:none;width:44px;height:44px;border-radius:4px;
  background:rgba(61,214,255,.1);border:1px solid var(--neon);
  box-shadow:0 0 12px rgba(61,214,255,.3);
  align-items:center;justify-content:center}
.nav-7-toggle span,.nav-7-toggle span::before,.nav-7-toggle span::after{
  display:block;width:18px;height:2px;background:var(--neon);position:relative;box-shadow:0 0 6px var(--neon);
}
.nav-7-toggle span::before,.nav-7-toggle span::after{content:'';position:absolute;left:0;right:0}
.nav-7-toggle span::before{top:-6px}
.nav-7-toggle span::after{top:6px}

@media (max-width:900px){
  .nav-7{padding:10px 16px}
  .nav-7-inner{grid-template-columns:44px 1fr 44px;gap:0}
  .nav-7-left,.nav-7-right{display:none !important}
  .nav-7-toggle{display:flex;grid-column:3}
  .nav-7-inner::before{content:'';grid-column:1;width:44px}
  .nav-7-logo{grid-column:2;justify-self:center}
  .nav-7-logo img{height:48px}
  .nav-7-logo::before,.nav-7-logo::after{display:none}
}

/* Demo hero */
.demo-hero{padding:130px 32px 80px;text-align:center;
  background:linear-gradient(135deg,#1b2f6e,#0a1028);color:var(--white);
  min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden}
.demo-hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 10%,rgba(61,214,255,.18),transparent 60%)}
.demo-hero h1{position:relative;font-size:clamp(36px,6vw,64px);line-height:.95;margin-bottom:16px}
.demo-hero h1 .accent{color:var(--neon);text-shadow:0 0 30px rgba(61,214,255,.5)}
.demo-hero p{position:relative;font-size:17px;color:rgba(255,255,255,.78);max-width:620px;margin:0 auto}
</style></head>
<body>

            <div class="nav-7-dropdown-title">Camps</div><div class="nav-7-dropdown-sub">Full-day</div>

          <a class="nav-7-dropdown-item" href="#">

</body></html>
