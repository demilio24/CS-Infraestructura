<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nav Variation 2 — Floating Glass Pill</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--navy-900:#0a1028;--navy-800:#111a3d;--navy-700:#1a2554;--blue-700:#1b2f6e;--blue-500:#2f82c4;--blue-400:#4aa3e0;--gold:#d4af37;--white:#fff;--ink:#0d1534}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--white);color:var(--ink)}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
h1,h2,h3{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.01em;margin:0}

/* ======= FLOATING GLASS PILL NAV ======= */
.nav-2-wrap{
  position:fixed;top:20px;left:0;right:0;z-index:100;
  padding:0 24px;pointer-events:none;
}
.nav-2{
  pointer-events:auto;
  max-width:1200px;margin:0 auto;
  background:rgba(255,255,255,.72);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  backdrop-filter:blur(24px) saturate(160%);
  border:1px solid rgba(255,255,255,.5);
  border-radius:100px;
  box-shadow:0 20px 60px -20px rgba(27,47,110,.25),0 4px 14px rgba(27,47,110,.08),inset 0 1px 0 rgba(255,255,255,.9);
  padding:10px 14px 10px 28px;
  display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;
  position:relative;
}
/* Triangle accents on pill */
.nav-2::before,.nav-2::after{
  content:'';position:absolute;top:50%;transform:translateY(-50%);
  width:0;height:0;border:7px solid transparent;
}
.nav-2::before{left:-14px;border-right-color:rgba(47,130,196,.5)}
.nav-2::after{right:-14px;border-left-color:rgba(47,130,196,.5)}

.nav-2-logo{display:flex;align-items:center;gap:8px}
.nav-2-logo-triangle{
  width:0;height:0;border:5px solid transparent;border-left-color:var(--blue-500);
}
.nav-2-logo img{height:48px;width:auto}

.nav-2-center{
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.nav-2-link{
  color:var(--ink);
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:.02em;
  padding:10px 18px;border-radius:100px;
  transition:background .2s,color .2s;
  display:inline-flex;align-items:center;gap:6px;
}
.nav-2-link:hover{background:rgba(47,130,196,.08);color:var(--blue-700)}
.nav-2-link svg{width:10px;height:10px}

/* CTA */
.nav-2-cta{
  background:linear-gradient(135deg,var(--blue-500),var(--blue-700));
  color:var(--white) !important;
  padding:12px 22px !important;font-weight:700 !important;
  box-shadow:0 8px 22px -6px rgba(47,130,196,.55);
  transition:transform .2s,box-shadow .2s;
  white-space:nowrap;
}
.nav-2-cta:hover{transform:translateY(-2px);box-shadow:0 14px 32px -8px rgba(47,130,196,.75)}

/* Dropdown with pictures */
.nav-2-dropdown{position:relative}
.nav-2-dropdown-menu{
  position:absolute;top:calc(100% + 14px);left:50%;transform:translate(-50%,-8px);
  background:rgba(255,255,255,.96);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border:1px solid rgba(27,47,110,.1);
  border-radius:20px;padding:12px;
  min-width:620px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  box-shadow:0 30px 80px -20px rgba(27,47,110,.3);
  opacity:0;visibility:hidden;transition:all .25s;
}
.nav-2-dropdown:hover .nav-2-dropdown-menu{opacity:1;visibility:visible;transform:translate(-50%,0)}
.nav-2-dropdown-item{
  display:flex;flex-direction:column;gap:6px;
  padding:12px;border-radius:14px;
  transition:all .2s;
}
.nav-2-dropdown-item:hover{background:rgba(47,130,196,.08)}
.nav-2-dropdown-thumb{aspect-ratio:4/3;border-radius:10px;overflow:hidden;background:var(--navy-800)}
.nav-2-dropdown-thumb img{width:100%;height:100%;object-fit:cover}
.nav-2-dropdown-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:var(--navy-900);text-transform:uppercase;letter-spacing:.03em;margin-top:4px}
.nav-2-dropdown-sub{font-size:11px;color:#5a6585;line-height:1.4}

/* Mobile toggle */
.nav-2-toggle{display:none;width:44px;height:44px;border-radius:50%;
  background:rgba(47,130,196,.12);align-items:center;justify-content:center}
.nav-2-toggle span,.nav-2-toggle span::before,.nav-2-toggle span::after{
  display:block;width:18px;height:2px;background:var(--blue-700);position:relative;border-radius:2px;
}
.nav-2-toggle span::before,.nav-2-toggle span::after{content:'';position:absolute;left:0;right:0}
.nav-2-toggle span::before{top:-6px}
.nav-2-toggle span::after{top:6px}

@media (max-width:900px){
  .nav-2-wrap{padding:0 16px;top:14px}
  .nav-2{grid-template-columns:44px 1fr auto;padding:8px 10px 8px 14px;gap:0}
  .nav-2-center,.nav-2-right .nav-2-cta{display:none}
  .nav-2-toggle{display:flex}
  .nav-2-logo{justify-self:center;grid-column:2}
  .nav-2-logo img{height:44px}
  .nav-2::before{content:'';grid-column:1;width:44px;background:none;border:0;transform:none;position:static}
  .nav-2::after{display:none}
}

/* Demo hero under nav */
.demo-hero{
  padding:140px 32px 80px;text-align:center;
  background:linear-gradient(180deg,#f4f8fd 0%,#fff 70%);
  color:var(--ink);
  min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.demo-hero h1{font-size:clamp(36px,6vw,64px);line-height:.95;margin-bottom:16px}
.demo-hero h1 .accent{background:linear-gradient(135deg,var(--blue-500),var(--blue-700));-webkit-background-clip:text;background-clip:text;color:transparent}
.demo-hero p{font-size:17px;color:#475067;max-width:560px;margin:0 auto}
</style>
</head>
<body>

<div class="nav-2-wrap">
  <nav class="nav-2">
    <a class="nav-2-logo" href="#" aria-label="Systema Floyd home">
      <span class="nav-2-logo-triangle"></span>
      <img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/5d66f583-c02a-4140-91aa-5f3362ec9b01.png" alt="Systema Floyd" />
    </a>

    <div class="nav-2-center">
      <div class="nav-2-dropdown">
        <button class="nav-2-link" type="button">Programs
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="nav-2-dropdown-menu">
          <a class="nav-2-dropdown-item" href="#">
            <div class="nav-2-dropdown-thumb"><img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/dead9e1c-b720-4d7b-9795-6c1eca9652eb.jpg" alt="" /></div>
            <div class="nav-2-dropdown-title">After School</div>
            <div class="nav-2-dropdown-sub">On-campus martial arts, 5 locations</div>
          </a>
          <a class="nav-2-dropdown-item" href="#">
            <div class="nav-2-dropdown-thumb"><img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/9f6e9e68-bfe3-4c06-9e0d-6cb868640361.png" alt="" /></div>
            <div class="nav-2-dropdown-title">Camps</div>
            <div class="nav-2-dropdown-sub">Full-day, summer + breaks</div>
          </a>
          <a class="nav-2-dropdown-item" href="#">
            <div class="nav-2-dropdown-thumb"><img src="https://assets.cdn.filesafe.space/8IWtNFlmgJ8bif9DivHT/media/ad436bea-070b-42f7-a748-97719ac56033.jpg" alt="" /></div>
            <div class="nav-2-dropdown-title">Spirit Dance</div>
            <div class="nav-2-dropdown-sub">Pom, hip-hop, team spirit</div>
          </a>
        </div>
      </div>
      <a class="nav-2-link" href="#">Campuses</a>
      <a class="nav-2-link" href="#">About</a>
      <a class="nav-2-link" href="#">Contact</a>
    </div>

    <div class="nav-2-right">
      <a class="nav-2-link nav-2-cta" href="#">Get Started →</a>
      <button class="nav-2-toggle" aria-label="Menu"><span></span></button>
    </div>
  </nav>
</div>

<section class="demo-hero">
  <h1>Raise a <span class="accent">Warrior.</span></h1>
  <p>Variation 2 — Floating Glass Pill. Detached pill, heavy glass blur, rounded elegant shape, blue gradient CTA.</p>
</section>
</body></html>
