<!-- VARIATION C: Pure minimalism, single hero image, ample whitespace -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300;400;500&display=swap');

  .vty-c * { margin: 0; padding: 0; box-sizing: border-box; }

  .vty-c {
    --bg: #F6F3EF;
    --ink: #1A1A1A;
    --choc: #4a2f24;
    --editorial: #D1C7BC;
    --serif: 'Playfair Display', Georgia, serif;
    --ui: 'Inter', system-ui, sans-serif;

    font-family: var(--ui);
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 88px 24px 96px;
  }

  .vty-c .eyebrow {
    font-family: var(--ui);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.46em;
    color: var(--choc);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    animation: vtycRise 1s ease 0.05s forwards;
  }

  .vty-c h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(56px, 8vw, 104px);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-align: center;
    margin-top: 40px;
    opacity: 0;
    transform: translateY(14px);
    animation: vtycRise 1.1s ease 0.35s forwards;
  }
  .vty-c h1 em {
    font-style: italic;
    color: var(--choc);
  }

  .vty-c .msg {
    margin-top: 32px;
    font-family: var(--ui);
    font-weight: 300;
    font-size: 16px;
    line-height: 1.75;
    color: #3a2e28;
    text-align: center;
    max-width: 440px;
    opacity: 0;
    transform: translateY(10px);
    animation: vtycRise 1s ease 0.6s forwards;
  }

  .vty-c .hero {
    margin-top: 72px;
    width: 100%;
    max-width: 680px;
    aspect-ratio: 4/5;
    overflow: hidden;
    background: var(--editorial);
    opacity: 0;
    transform: translateY(24px);
    animation: vtycRise 1.4s ease 0.9s forwards;
  }
  .vty-c .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scale(1.06);
    animation: vtycZoom 16s ease-out 0.9s both;
  }
  @keyframes vtycZoom {
    0% { transform: scale(1.12); }
    100% { transform: scale(1.02); }
  }

  .vty-c .sign {
    margin-top: 56px;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--choc);
    opacity: 0;
    transform: translateY(8px);
    animation: vtycRise 1s ease 1.25s forwards;
  }

  @keyframes vtycRise { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 768px) {
    .vty-c { padding: 64px 24px 72px; }
    .vty-c h1 { font-size: 56px; margin-top: 32px; }
    .vty-c .msg { font-size: 15px; margin-top: 24px; max-width: 320px; }
    .vty-c .hero { margin-top: 52px; aspect-ratio: 3/4; }
    .vty-c .sign { margin-top: 40px; font-size: 16px; }
  }
</style>

<div class="vty-c">
  <span class="eyebrow">VELUS Interiors</span>
  <h1>Thank <em>you</em>.</h1>
  <p class="msg">Your inquiry has been received. Mandy will reach out personally, shortly.</p>
  <div class="hero">
    <img src="https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/c08e48b9-fc78-48b4-94d7-8af3b49e5d8f.jpeg" alt="VELUS Interiors project" />
  </div>
  <span class="sign">Mandy Velus</span>
</div>
