<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300;400;500&display=swap');

  .vty * { margin: 0; padding: 0; box-sizing: border-box; }

  .vty {
    --bg: #F6F3EF;
    --ink: #1A1A1A;
    --choc: #4a2f24;
    --editorial: #D1C7BC;
    --serif: 'Playfair Display', Georgia, serif;
    --ui: 'Inter', system-ui, sans-serif;

    font-family: var(--ui);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    padding: 72px 24px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .vty-mark {
    font-family: var(--serif);
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.32em;
    color: var(--choc);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    animation: vtyRise 0.9s ease 0.05s forwards;
  }

  .vty-rule {
    width: 48px;
    height: 1px;
    background: var(--choc);
    opacity: 0;
    margin: 28px 0 32px;
    transform: scaleX(0);
    transform-origin: center;
    animation: vtyLine 0.8s ease 0.35s forwards;
  }

  .vty h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(38px, 6.4vw, 64px);
    line-height: 1.05;
    letter-spacing: 0.01em;
    text-align: center;
    color: var(--ink);
    margin-bottom: 22px;
    opacity: 0;
    transform: translateY(12px);
    animation: vtyRise 1s ease 0.5s forwards;
  }

  .vty h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--choc);
  }

  .vty-msg {
    font-family: var(--ui);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
    letter-spacing: 0.01em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(10px);
    text-align: center;
    max-width: 420px;
    margin: 0 auto;
    animation: vtyRise 1s ease 0.75s forwards;
  }
  .vty-msg .soft { color: #6b5a50; }

  .vty-gallery {
    margin-top: 64px;
    width: 100%;
    max-width: 1080px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }

  .vty-gallery figure {
    position: relative;
    overflow: hidden;
    aspect-ratio: 3/4;
    background: #E9E3DA;
    opacity: 0;
    transform: translateY(18px);
    animation: vtyRise 1.1s ease forwards;
  }
  .vty-gallery figure:nth-child(1) { animation-delay: 0.95s; }
  .vty-gallery figure:nth-child(2) { animation-delay: 1.1s; }
  .vty-gallery figure:nth-child(3) { animation-delay: 1.25s; }

  .vty-gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scale(1.02);
    transition: transform 1.6s ease;
  }
  .vty-gallery figure:hover img { transform: scale(1.06); }

  .vty-sign {
    margin-top: 56px;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--choc);
    opacity: 0;
    transform: translateY(8px);
    animation: vtyRise 1s ease 1.4s forwards;
  }

  @keyframes vtyRise {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes vtyLine {
    to { opacity: 1; transform: scaleX(1); }
  }

  @media (max-width: 768px) {
    .vty { padding: 56px 22px 56px; }
    .vty-rule { margin: 22px 0 26px; width: 40px; }
    .vty h1 { font-size: 38px; margin-bottom: 18px; }
    .vty-msg { font-size: 14.5px; max-width: 320px; }
    .vty-gallery {
      margin-top: 44px;
      grid-template-columns: 1fr;
      gap: 14px;
      max-width: 380px;
    }
    .vty-gallery figure { aspect-ratio: 4/3; }
    .vty-sign { margin-top: 40px; font-size: 12px; }
  }
</style>

<div class="vty">
  <span class="vty-mark">VELUS Interiors</span>
  <div class="vty-rule"></div>
  <h1>Thank <em>you</em>.</h1>
  <p class="vty-msg">
    We received your inquiry.<br/>
    <span class="soft">Mandy will reach out personally, shortly.</span>
  </p>

  <div class="vty-gallery">

    </figure>
    <figure>

    </figure>
    <figure>
      <img src="https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/c08e48b9-fc78-48b4-94d7-8af3b49e5d8f.jpeg" alt="Vance Residence, detail" loading="lazy" />
    </figure>
  </div>

  <span class="vty-sign">Mandy Velus</span>
</div>
