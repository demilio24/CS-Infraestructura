<style>
  html, body { overflow-x: hidden !important; }
  body,
  .hl_page-preview--content,
  .hl_page-preview--content > div,
  .custom-code-element,
  section, .section,
  .row, .inner-row,
  .col, .inner-col,
  .container,
  [class*="container"],
  [class*="wrapper"] {
    max-width: 100% !important;
    width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
  }
</style>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  .ty-wrap * { margin: 0; padding: 0; box-sizing: border-box; }

  .ty-wrap {
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #2a1e1a;
  }

  .ty-wrap .bg {
    position: absolute;
    inset: 0;
  }
  .ty-wrap .bg-slides {
    position: absolute;
    inset: -12px;
  }
  .ty-wrap .bg-slides img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0;
    filter: blur(10px) brightness(0.28) saturate(1.3);
    transform: scale(1.08);
    animation: tyBgFade 42s infinite;
  }
  .ty-wrap .bg-slides img:nth-child(1) { animation-delay: 0s; }
  .ty-wrap .bg-slides img:nth-child(2) { animation-delay: 14s; }
  .ty-wrap .bg-slides img:nth-child(3) { animation-delay: 28s; }
  @keyframes tyBgFade {
    0% { opacity: 0; }
    2.5% { opacity: 1; }
    33.33% { opacity: 1; }
    35.83% { opacity: 0; }
    100% { opacity: 0; }
  }
  .ty-wrap .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 350px 250px at 30% 40%, rgba(184,154,106,0.15) 0%, transparent 100%),
      radial-gradient(ellipse 300px 350px at 70% 60%, rgba(154,109,31,0.1) 0%, transparent 100%);
    animation: tyShift 8s ease-in-out infinite alternate;
  }
  @keyframes tyShift {
    0% { opacity: 0.6; transform: translateX(0) scale(1); }
    100% { opacity: 1; transform: translateX(-15px) scale(1.04); }
  }

  .ty-card {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 420px;
    width: 100%;
    margin: 24px 20px;
    background: rgba(250,246,240,0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px 32px 36px;
    box-shadow:
      0 24px 64px rgba(0,0,0,0.35),
      0 4px 16px rgba(0,0,0,0.15),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }

  .ty-logo-wrap {
    width: 88px;
    height: 88px;
    margin: 0 auto 24px;
    position: relative;
    animation: tyFadeUp 0.4s ease both;
  }
  .ty-logo-wrap img { display: none; }
  .ty-check-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #9a6d1f;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: tyFadeUp 0.5s ease 0.1s both;
    box-shadow: 0 4px 16px rgba(184,154,106,0.4);
  }
  .ty-check-overlay svg {
    width: 40px;
    height: 40px;
    stroke-dasharray: 30;
    animation: tyDrawCheck 0.45s ease 0.55s both;
  }
  .ty-logo-wrap::after {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2.5px solid rgba(184,154,106,0.3);
  }

  @keyframes tyCheckFlash {
    0% { opacity: 0; transform: scale(0.5); }
    15% { opacity: 1; transform: scale(1); }
    55% { opacity: 1; transform: scale(1); }
    80% { opacity: 0; transform: scale(1.05); }
    100% { opacity: 0; pointer-events: none; }
  }
  @keyframes tyRingFlash {
    0% { opacity: 0; transform: scale(0.8); }
    15% { opacity: 1; transform: scale(1); }
    55% { opacity: 1; transform: scale(1); }
    80% { opacity: 0; transform: scale(1.3); }
    100% { opacity: 0; }
  }
  @keyframes tyDrawCheck {
    0% { stroke-dashoffset: 30; opacity: 0; }
    100% { stroke-dashoffset: 0; opacity: 1; }
  }
  @keyframes tyFadeUp {
    0% { transform: translateY(14px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .ty-card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: #2a1e1a;
    margin-bottom: 8px;
    line-height: 1.2;
    animation: tyFadeUp 0.5s ease 0.3s both;
  }
  .ty-card .ty-sub {
    font-size: 15px;
    color: #6b5a50;
    line-height: 1.6;
    margin-bottom: 28px;
    animation: tyFadeUp 0.5s ease 0.4s both;
  }

  .ty-contact {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
    animation: tyFadeUp 0.5s ease 0.55s both;
  }
  .ty-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 28px;
    color: #fff !important;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none !important;
    border-radius: 12px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .ty-cta::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    animation: tyShimmer 3s ease-in-out 1s infinite;
  }
  @keyframes tyShimmer {
    0% { left: -100%; }
    30% { left: 100%; }
    100% { left: 100%; }
  }
  .ty-cta:hover {
    transform: translateY(-2px);
  }
  .ty-cta svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .ty-cta-phone {
    background: #9a6d1f;
    box-shadow: 0 4px 18px rgba(154,109,31,0.35);
  }
  .ty-cta-phone:hover {
    box-shadow: 0 8px 28px rgba(154,109,31,0.45);
  }
  .ty-cta-email {
    background: #2a1e1a;
    box-shadow: 0 4px 18px rgba(42,30,26,0.25);
  }
  .ty-cta-email:hover {
    box-shadow: 0 8px 28px rgba(42,30,26,0.35);
  }

  .ty-steps {
    margin-top: 24px;
    animation: tyFadeUp 0.5s ease 0.7s both;
  }
  .ty-steps-label {
    font-size: 10px;
    font-weight: 700;
    color: #a89585;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .ty-step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 16px;
    border-radius: 10px;
    margin-bottom: 5px;
  }
  .ty-step:first-child {
    background: rgba(184,154,106,0.1);
  }
  .ty-step:last-child { margin-bottom: 0; }
  .ty-step-dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
  }
  .ty-step-dot.done {
    background: rgba(184,154,106,0.2);
    color: #9a6d1f;
  }
  .ty-step-dot.pending {
    background: rgba(42,30,26,0.06);
    color: #6b5a50;
  }
  .ty-step-text {
    font-size: 13px;
    color: #6b5a50;
    line-height: 1.4;
    text-align: left;
  }
  .ty-step-text strong {
    color: #2a1e1a;
    font-weight: 700;
  }

  @media (max-width: 480px) {
    .ty-card { padding: 32px 22px 28px; margin: 16px; }
    .ty-logo-wrap { width: 72px; height: 72px; }
    .ty-logo-wrap img { width: 72px; height: 72px; }
    .ty-check-overlay svg { width: 32px; height: 32px; }
    .ty-card h1 { font-size: 24px; }
    .ty-card .ty-sub { font-size: 14px; }
    .ty-cta { font-size: 15px; padding: 14px 22px; }
  }
</style>
