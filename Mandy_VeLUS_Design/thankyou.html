<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300;400;500&display=swap');

  .vty-b * { margin: 0; padding: 0; box-sizing: border-box; }

  .vty-b {
    --bg: #F6F3EF;
    --ink: #1A1A1A;
    --cream: #F6F3EF;
    --choc: #4a2f24;
    --serif: 'Playfair Display', Georgia, serif;
    --ui: 'Inter', system-ui, sans-serif;

    position: relative;
    width: 100vw;
    min-height: 100vh;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    overflow: hidden;
    color: var(--cream);
    font-family: var(--ui);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .vty-b .hero-img {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .vty-b .hero-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    animation: vtybZoom 14s ease-out both;
  }
  @keyframes vtybZoom {
    0% { transform: scale(1.12); filter: blur(6px); }
    100% { transform: scale(1.02); filter: blur(0); }
  }
  .vty-b .hero-img::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(26,26,26,0.28) 0%, rgba(26,26,26,0.55) 60%, rgba(26,26,26,0.7) 100%),
      radial-gradient(ellipse 70vw 60vh at center, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.35) 100%);
  }

  .vty-b .panel {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 64px 28px;
    max-width: 640px;
  }

  .vty-b h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(48px, 7vw, 88px);
    line-height: 1;
    letter-spacing: 0;
    color: var(--cream);
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(12px);
    animation: vtybRise 1.1s ease 0.75s forwards;
  }
  .vty-b h1 em {
    font-style: italic;
    color: #E6D9C5;
  }

  .vty-b p {
    font-family: var(--ui);
    font-weight: 300;
    font-size: 16px;
    line-height: 1.8;
    color: rgba(255,255,255,0.88);
    max-width: 480px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(10px);
    animation: vtybRise 1s ease 1s forwards;
  }

  .vty-b .sign {
    margin-top: 48px;
    display: inline-block;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 20px;
    color: #E6D9C5;
    opacity: 0;
    transform: translateY(8px);
    animation: vtybRise 1s ease 1.3s forwards;
  }

  @keyframes vtybRise { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 768px) {
    .vty-b .panel { padding: 56px 24px; }
    .vty-b h1 { font-size: 46px; }
    .vty-b p { font-size: 15px; }
    .vty-b .sign { margin-top: 36px; font-size: 17px; }
  }
</style>

<div class="vty-b">
  <div class="hero-img">
    <img src="https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/ef8fa439-e21b-488d-b53e-1edfe2146148.jpeg" alt="VELUS Interiors, Vance Residence" />
  </div>
  <div class="panel">
    <h1>Thank <em>you</em>.</h1>
    <p>Your inquiry has reached us. Mandy will be in touch shortly, with the quiet attention every project deserves.</p>
    <span class="sign">Mandy Velus</span>
  </div>
</div>
