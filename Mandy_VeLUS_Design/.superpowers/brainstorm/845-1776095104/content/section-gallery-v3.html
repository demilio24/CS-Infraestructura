<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Option 4 Refined</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAF6F0; color: #3A241E; }
  img { max-width: 100%; display: block; }
  .gallery-section { max-width: 1100px; margin: 0 auto; padding: 80px 24px; }
  .gallery-header { text-align: center; margin-bottom: 32px; }
  .gallery-label { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: #B89A6A; margin-bottom: 12px; }
  .gallery-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300; color: #3A241E; line-height: 1.15; }

  /* Filter pills */
  .filters { display: flex; gap: 8px; justify-content: center; margin-bottom: 36px; flex-wrap: wrap; }
  .filter-pill { padding: 9px 22px; border-radius: 100px; font-size: 12px; font-weight: 400; letter-spacing: .03em; cursor: pointer; transition: all .3s ease; border: 1px solid rgba(58,36,30,.1); color: #7A6B62; background: transparent; }
  .filter-pill.active { background: #3A241E; color: #F3EBDD; border-color: #3A241E; }
  .filter-pill:hover:not(.active) { border-color: rgba(184,154,106,.4); color: #3A241E; }

  /* Hero image */
  .gallery-hero { border-radius: 14px; overflow: hidden; margin-bottom: 14px; box-shadow: 0 12px 40px rgba(42,30,26,.08); }
  .gallery-hero img { width: 100%; height: 380px; object-fit: cover; object-position: center; }

  /* Grid */
  .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .gallery-item { border-radius: 10px; overflow: hidden; box-shadow: 0 4px 16px rgba(42,30,26,.06); cursor: pointer; transition: transform .3s ease, box-shadow .3s ease; }
  .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(42,30,26,.12); }
  .gallery-item img { width: 100%; height: 180px; object-fit: cover; object-position: center; }
  .gallery-item.hidden { display: none; }

  /* CTA */
  .gallery-cta { text-align: center; margin-top: 56px; }
  .gallery-cta-text { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: #3A241E; margin-bottom: 8px; }
  .gallery-cta-sub { font-size: 14px; color: #7A6B62; margin-bottom: 24px; line-height: 1.7; }
  .btn-gold { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 40px; background: linear-gradient(135deg, #9a6d1f 0%, #B89A6A 45%, #D4B87A 100%); color: #fff; font-size: 13px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; border: none; border-radius: 10px; cursor: pointer; text-decoration: none; box-shadow: 0 8px 28px rgba(184,154,106,.25); transition: all .3s ease; }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(184,154,106,.35); }
  .btn-outline { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 40px; background: transparent; color: #3A241E; font-size: 13px; font-weight: 400; letter-spacing: .08em; text-transform: uppercase; border: 1px solid rgba(58,36,30,.12); border-radius: 10px; cursor: pointer; text-decoration: none; transition: all .3s ease; }
  .btn-outline:hover { border-color: #B89A6A; color: #B89A6A; }
</style>
</head>

    <div class="gallery-item" data-cat="living"><img src="https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/3fc94637-65b1-4d49-9b95-11d5a01f06f0.jpg" alt="Living room — waterfront coastal"></div>

<script>
// Filter functionality
const pills = document.querySelectorAll('.filter-pill');
const items = document.querySelectorAll('.gallery-item');
const heroImg = document.getElementById('heroImg');

// First image per category for hero
const heroImages = {
  all: 'https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/4ad8cbdb-b492-415c-8ac6-3dde21d30e46.jpg',
  living: 'https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/e74a0b20-884a-4e6c-8ccb-4c60e682cd28.jpg',
  kitchen: 'https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/5c5f1580-b05f-4755-b41d-57d43533a552.jpg',
  bathroom: 'https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/faada81f-d8e3-4347-bf39-82dad0dad9d4.jpg',
  bedroom: 'https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/9bc2e8a4-ae1b-49b8-82f2-1665e85cf35c.jpg'
};

pills.forEach(pill => {
  pill.addEventListener('click', () => {
    const filter = pill.dataset.filter;
    pills.forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    // Update hero
    heroImg.style.opacity = '0';
    setTimeout(() => {
      heroImg.src = heroImages[filter];
      heroImg.style.opacity = '1';
    }, 200);

    // Filter grid
    items.forEach(item => {
      if (filter === 'all' || item.dataset.cat === filter) {
        item.classList.remove('hidden');
      } else {
        item.classList.add('hidden');
      }
    });
  });
});

// Click grid item to make it the hero
items.forEach(item => {
  item.addEventListener('click', () => {
    const src = item.querySelector('img').src;
    heroImg.style.opacity = '0';
    setTimeout(() => {
      heroImg.src = src;
      heroImg.style.opacity = '1';
    }, 200);
    window.scrollTo({ top: document.getElementById('galleryHero').offsetTop - 100, behavior: 'smooth' });
  });
});
</script>

<style>
  .gallery-hero img { transition: opacity .3s ease; }
</style>
