<!-- VARIATION A: Editorial Spread (asymmetric split) -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300;400;500&display=swap');

  .vty-a * { margin: 0; padding: 0; box-sizing: border-box; }

  .vty-a {
    --bg: #F6F3EF;
    --ink: #1A1A1A;
    --choc: #4a2f24;
    --serif: 'Playfair Display', Georgia, serif;
    --ui: 'Inter', system-ui, sans-serif;

    font-family: var(--ui);
    color: var(--ink);
    background: var(--bg);
    min-height: 100vh;
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .vty-a .photo {
    position: relative;
    overflow: hidden;
    min-height: 100vh;
  }
  .vty-a .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scale(1.04);
    animation: vtyaZoom 12s ease-out both;
  }
  @keyframes vtyaZoom {
    0% { transform: scale(1.12); filter: blur(4px); opacity: 0.85; }
    100% { transform: scale(1.04); filter: blur(0); opacity: 1; }
  }

  .vty-a .text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px 8vw;
  }

  .vty-a .eyebrow {
    font-family: var(--ui);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.42em;
    color: var(--choc);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    animation: vtyaRise 0.9s ease 0.1s forwards;
  }

  .vty-a .rule {
    width: 56px;
    height: 1px;
    background: var(--choc);
    margin: 28px 0 36px;
    transform: scaleX(0);
    transform-origin: left;
    animation: vtyaLine 0.9s ease 0.4s forwards;
  }

  .vty-a h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(44px, 5vw, 72px);
    line-height: 1;
    letter-spacing: -0.005em;
    color: var(--ink);
    margin-bottom: 28px;
    opacity: 0;
    transform: translateY(10px);
    animation: vtyaRise 1s ease 0.55s forwards;
  }
  .vty-a h1 em {
    font-style: italic;
    color: var(--choc);
  }

  .vty-a p {
    font-family: var(--ui);
    font-weight: 300;
    font-size: 16px;
    line-height: 1.75;
    color: #3a2e28;
    max-width: 420px;
    opacity: 0;
    transform: translateY(10px);
    animation: vtyaRise 1s ease 0.8s forwards;
  }

  .vty-a .sign {
    margin-top: 56px;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 300;
    font-size: 18px;
    color: var(--choc);
    opacity: 0;
    transform: translateY(8px);
    animation: vtyaRise 1s ease 1.1s forwards;
  }

  @keyframes vtyaRise { to { opacity: 1; transform: translateY(0); } }
  @keyframes vtyaLine { to { transform: scaleX(1); } }

  @media (max-width: 900px) {
    .vty-a { grid-template-columns: 1fr; }
    .vty-a .photo { min-height: 56vh; }
    .vty-a .text { padding: 56px 28px 64px; }
    .vty-a h1 { font-size: 40px; }
    .vty-a p { font-size: 15px; }
    .vty-a .rule { margin: 22px 0 26px; }
    .vty-a .sign { margin-top: 36px; font-size: 16px; }
  }
</style>

<div class="vty-a">
  <div class="photo">
    <img src="https://assets.cdn.filesafe.space/dYpRMKt41LMBrYEUoeLG/media/ef8fa439-e21b-488d-b53e-1edfe2146148.jpeg" alt="VELUS Interiors project" />
  </div>
  <div class="text">
    <span class="eyebrow">VELUS Interiors</span>
    <div class="rule"></div>
    <h1>Thank <em>you</em>.</h1>
    <p>We have received your inquiry. Mandy will reach out personally to begin a quiet, considered conversation about your space.</p>
    <span class="sign">Mandy Velus</span>
  </div>
</div>
