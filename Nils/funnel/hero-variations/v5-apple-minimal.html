<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V5 — Apple Minimalist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #fbfbfd;
    color: #1d1d1f;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 96px 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 1100px;
    height: 1100px;
    background: radial-gradient(circle, rgba(0, 122, 255, 0.06) 0%, rgba(0, 122, 255, 0.02) 30%, transparent 60%);
    border-radius: 50%;
    pointer-events: none;
  }
  .inner { max-width: 1080px; width: 100%; position: relative; z-index: 1; text-align: center; }
  .eyebrow {
    display: inline-block;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: #0071e3;
    margin-bottom: 22px;
  }
  h1 {
    font-size: clamp(44px, 7vw, 96px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.045em;
    margin-bottom: 24px;
    text-wrap: balance;
    color: #1d1d1f;
  }
  .badge {
    display: inline;
    background: linear-gradient(135deg, #0071e3 0%, #00c6ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
    white-space: nowrap;
  }
  .tail {
    display: block;
    margin-top: 18px;
    font-size: 0.4em;
    font-weight: 500;
    color: #6e6e73;
    letter-spacing: -0.01em;
    line-height: 1.35;
  }
  .desc {
    font-size: 19px;
    color: #6e6e73;
    max-width: 540px;
    margin: 32px auto 0;
    line-height: 1.5;
    font-weight: 400;
  }
  @media (max-width: 640px) {
    .hero { padding: 64px 20px; }
    h1 { font-size: clamp(34px, 9.4vw, 56px); }
    .desc { font-size: 16px; }
  }
</style>
</head>
<body>
<section class="hero">
  <div class="inner">
    <div class="eyebrow">Business owners trying to grow</div>
    <h1>
      Find out if you could be getting <span class="badge">4X more clients</span> guaranteed.
      <span class="tail">With a simple website funnel + Google Ads system.</span>
    </h1>
    <p class="desc">Answer 4 quick questions to see if you qualify for a free strategy call.</p>
  </div>
</section>
</body>
</html>
