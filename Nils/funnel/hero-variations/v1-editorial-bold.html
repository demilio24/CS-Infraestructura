<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1 — Editorial Bold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #fff; color: #0a0a0a; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: -200px;
    right: -200px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(4,107,210,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: "";
    position: absolute;
    bottom: -300px;
    left: -200px;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(4,107,210,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .inner { max-width: 1100px; width: 100%; position: relative; z-index: 1; text-align: left; }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #0a0a0a;
    padding: 6px 0;
    border-top: 1.5px solid #0a0a0a;
    border-bottom: 1.5px solid #0a0a0a;
    margin-bottom: 32px;
  }
  h1 {
    font-size: clamp(40px, 6.4vw, 88px);
    font-weight: 900;
    line-height: 1.02;
    letter-spacing: -0.04em;
    margin-bottom: 20px;
    text-wrap: balance;
  }
  .badge {
    display: inline-block;
    background: #0a0a0a;
    color: #fff;
    padding: 0 14px;
    border-radius: 4px;
    font-weight: 900;
    line-height: 1.05;
  }
  .tail {
    display: block;
    margin-top: 16px;
    font-size: 0.42em;
    font-weight: 600;
    color: #555;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .desc {
    font-size: 18px;
    color: #555;
    max-width: 560px;
    margin-top: 32px;
    line-height: 1.55;
  }
  @media (max-width: 640px) {
    .hero { padding: 56px 20px; }
    h1 { font-size: clamp(32px, 9vw, 52px); }
    .desc { font-size: 15px; }
  }
</style>
</head>
<body>
<section class="hero">
  <div class="inner">
    <div class="eyebrow">Business owners trying to grow</div>
    <h1>
      Find out if you could be getting <span class="badge">4X more clients</span> guaranteed
      <span class="tail">with a simple website funnel + Google Ads system</span>
    </h1>
    <p class="desc">Answer 4 quick questions to see if you qualify for a free strategy call.</p>
  </div>
</section>
</body>
</html>
