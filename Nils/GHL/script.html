<script>
(function () {

  // ============================================================
  //  CONFIG — edit these two sections only
  // ============================================================

  // Emails OR user IDs that are allowed to see the full agency view
  var WHITELIST = [
    'you@yourdomain.com',       // <-- replace with your email
    'teammate@yourdomain.com'   // <-- add more as needed
  ];

  // If we can't find the user's assigned location, fall back to this sub-account
  var DEFAULT_LOCATION_ID = 'YOUR_LOCATION_ID_HERE'; // <-- replace with your sub-account location ID

  // Set to true temporarily if the redirect isn't working — check the browser console
  var DEBUG = false;

  // ============================================================
  //  INTERNALS — no need to touch below this line
  // ============================================================

  function log() {
    if (DEBUG) console.log('[GHL-GUARD]', ...arguments);
  }

  // --- Decode a JWT without any library ---
  function parseJwt(token) {
    try {
      return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    } catch (e) { return null; }
  }

  // --- Try every common GHL key until we find a user email or ID ---
  function getCurrentUser() {
    // 1. Known object keys
    var objKeys = ['user', 'userData', 'hl_user', 'auth_user', 'currentUser', 'ghl_user', 'logged_user'];
    for (var i = 0; i < objKeys.length; i++) {
      try {
        var raw = localStorage.getItem(objKeys[i]);
        if (raw) {
          var parsed = JSON.parse(raw);
          var id = parsed && (parsed.email || parsed.userId || parsed.id || parsed.user_id);
          if (id) { log('Found user via key "' + objKeys[i] + '":', id); return id; }
        }
      } catch (e) {}
    }

    // 2. JWT token keys
    var tokenKeys = ['access_token', 'token', 'id_token', 'jwt', 'hl_token', 'authToken'];
    for (var j = 0; j < tokenKeys.length; j++) {
      var t = localStorage.getItem(tokenKeys[j]);
      if (t && t.indexOf('.') !== -1) {
        var payload = parseJwt(t);
        var id2 = payload && (payload.email || payload.sub || payload.userId);
        if (id2) { log('Found user via JWT key "' + tokenKeys[j] + '":', id2); return id2; }
      }
    }

    // 3. Brute-force scan all localStorage keys for anything with email/id
    for (var k = 0; k < localStorage.length; k++) {
      var key = localStorage.key(k);
      try {
        var val = JSON.parse(localStorage.getItem(key));
        if (val && typeof val === 'object' && (val.email || val.userId)) {
          var found = val.email || val.userId;
          log('Found user via brute-force key "' + key + '":', found);
          return found;
        }
      } catch (e) {}
    }

    log('Could not identify current user');
    return null;
  }

  // --- Find the user's assigned sub-account location ID ---
  function getLocationId() {
    var locKeys = ['locationId', 'activeLocation', 'hl_location', 'currentLocation', 'location_id'];
    for (var i = 0; i < locKeys.length; i++) {
      var v = localStorage.getItem(locKeys[i]);
      if (v) { log('Found location via key "' + locKeys[i] + '":', v); return v; }
    }
    // Try user object
    var userKeys = ['user', 'userData', 'hl_user', 'currentUser'];
    for (var j = 0; j < userKeys.length; j++) {
      try {
        var raw = localStorage.getItem(userKeys[j]);
        if (raw) {
          var parsed = JSON.parse(raw);
          var loc = parsed && (parsed.locationId || parsed.location_id || parsed.activeLocation);
          if (loc) { log('Found location inside user object:', loc); return loc; }
        }
      } catch (e) {}
    }
    log('Falling back to DEFAULT_LOCATION_ID:', DEFAULT_LOCATION_ID);
    return DEFAULT_LOCATION_ID;
  }

  function isAgencyPath(path) {
    return /^\/(v2\/)?agency(\/|$)/.test(path);
  }

  // --- Nuke every agency-related UI element we can find ---
  function lockdownAgencyUI() {
    var selectors = [
      '[data-testid="switch-to-agency"]',
      '[data-testid="agency-switch"]',
      'button[class*="agencySwitch"]',
      'button[class*="agency-switch"]',
      'a[href*="/agency/"]',
      'a[href*="/v2/agency/"]',
      '[class*="switchAgency"]',
      '[class*="switch-agency"]',
      '[id*="agency-view"]',
      '[id*="agencyView"]',
    ];

    function sweep() {
      selectors.forEach(function (sel) {
        document.querySelectorAll(sel).forEach(function (el) {
          el.style.display = 'none';
          el.style.pointerEvents = 'none';
          el.setAttribute('aria-hidden', 'true');
          log('Hiding element:', sel);
        });
      });

      // Also hide/intercept any plain <a> pointing to agency
      document.querySelectorAll('a').forEach(function (el) {
        var href = el.getAttribute('href') || '';
        if (href.indexOf('/agency') !== -1) {
          el.style.display = 'none';
          el.addEventListener('click', function (e) { e.preventDefault(); e.stopPropagation(); }, true);
        }
      });
    }

    sweep();
    // Keep sweeping as React re-renders new nodes
    var observer = new MutationObserver(sweep);
    observer.observe(document.body, { childList: true, subtree: true });
  }

  // --- Intercept the router so React navigation can't sneak to agency ---
  function enforceRedirect() {
    var locId = getLocationId();
    var safeUrl = '/location/' + locId + '/dashboard';

    // Block SPA pushState / replaceState navigation to agency paths
    var _push = history.pushState.bind(history);
    var _replace = history.replaceState.bind(history);

    function guardUrl(fn) {
      return function (state, title, url) {
        if (url && isAgencyPath(String(url))) {
          log('Blocked pushState/replaceState to:', url, '→ redirecting to', safeUrl);
          return fn(state, title, safeUrl);
        }
        return fn(state, title, url);
      };
    }

    history.pushState = guardUrl(_push);
    history.replaceState = guardUrl(_replace);

    // Back/forward button
    window.addEventListener('popstate', function () {
      if (isAgencyPath(window.location.pathname)) {
        log('popstate to agency path — redirecting');
        window.location.replace(safeUrl);
      }
    });

    // Hard redirect if they loaded an agency URL directly
    if (isAgencyPath(window.location.pathname)) {
      log('Initial load on agency path — hard redirecting to', safeUrl);
      window.location.replace(safeUrl);
    }
  }

  // ============================================================
  //  MAIN
  // ============================================================

  // Wait until localStorage is populated (GHL sometimes writes it after load)
  function init() {
    var user = getCurrentUser();

    if (!user) {
      // Retry once after a short delay in case GHL hasn't written to localStorage yet
      setTimeout(function () {
        var retryUser = getCurrentUser();
        if (!retryUser || WHITELIST.indexOf(retryUser) === -1) {
          log('User not on whitelist after retry — locking down');
          enforceRedirect();
          lockdownAgencyUI();
        } else {
          log('User is whitelisted:', retryUser);
        }
      }, 1200);
      return;
    }

    if (WHITELIST.indexOf(user) === -1) {
      log('User "' + user + '" not on whitelist — locking down');
      enforceRedirect();
      lockdownAgencyUI();
    } else {
      log('User "' + user + '" is whitelisted — full access granted');
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
